# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "MealAnalysisPipeline — integration eval"

providers:
  - id: "file://providers/pipeline.ts"
    label: "guardrail:gpt-5.4 | meal:gpt-4.1 | safety:gpt-4o"
    config:
      guardrail:
        model: "gpt-5.4"
      mealAnalysis:
        model: "gpt-4.1"
      safety:
        model: "gpt-4o"

prompts:
  - "{{imageId}}"

tests: file://datasets/guardrail-meal.json

defaultTest:
  assert:
    - type: javascript
      value: file://asserters/pipeline.ts
      metric: pipeline_score

evaluateOptions:
  maxConcurrency: 72
