# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "MealAnalysisPipeline — integration eval"

providers:
  - id: "file://providers/pipeline.ts"
    label: "sequential | guardrail:gpt-5.4 | meal:gpt-4.1 | safety:gpt-4.1"
    config:
      parallel: false
      guardrail:
        model: "gpt-5.4"
      mealAnalysis:
        model: "gpt-4.1"
      safety:
        model: "gpt-4.1"

  - id: "file://providers/pipeline.ts"
    label: "parallel | guardrail:gpt-5.4 | meal:gpt-4.1 | safety:gpt-4.1"
    config:
      parallel: true
      guardrail:
        model: "gpt-5.4"
      mealAnalysis:
        model: "gpt-4.1"
      safety:
        model: "gpt-4.1"

prompts:
  - "{{imageId}}"

tests: file://datasets/guardrail-meal.json

defaultTest:
  assert:
    - type: javascript
      value: file://asserters/pipeline.ts
      metric: pipeline_score

evaluateOptions:
  maxConcurrency: 1000
